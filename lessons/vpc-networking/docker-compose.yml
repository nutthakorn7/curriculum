services:
  vulnerable:
    build: .
    command: python vulnerable_app.py
    environment:
      - FLAG_NACL=${FLAG_NACL:-FLAG{low_numbered_allow_shadows_the_deny}}
    ports:
      - "8113:5000"

  fixed:
    build: .
    command: python fixed_app.py
    environment:
      - FLAG_NACL=${FLAG_NACL:-FLAG{low_numbered_allow_shadows_the_deny}}
    ports:
      - "8114:5000"
