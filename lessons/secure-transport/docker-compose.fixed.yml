# Fixed topology: a TLS client that DOES validate the server cert against the
# demo CA.
#
# Run with:
#   docker compose -f docker-compose.fixed.yml up --build
#
# Identical to the vulnerable topology EXCEPT alice has VERIFY=1. She loads the
# demo CA (ca.crt) as her only trust anchor and keeps check_hostname=True. The
# `mitm` still presents the SAME self-signed impostor cert (its code is
# unchanged) -- but that cert has no chain to the demo CA, so Alice's TLS stack
# raises ssl.SSLCertVerificationError, she prints "CERT VERIFICATION FAILED -
# ABORTING", exits nonzero, and sends NOTHING. `mitm` receives nothing to
# decrypt, so "MITM INTERCEPTED" is never printed in this topology.
services:
  gen_certs:
    build: .
    container_name: week12-gencerts
    command: ["gen_certs.py"]
    environment:
      CERT_DIR: "/certs"
      SERVER_NAME: "bob"
    volumes:
      - certs:/certs
    networks:
      - labnet

  bob:
    build: .
    container_name: week12-bob
    command: ["bob.py"]
    environment:
      LISTEN_HOST: "0.0.0.0"
      LISTEN_PORT: "8443"
      CERT_DIR: "/certs"
    volumes:
      - certs:/certs
    depends_on:
      gen_certs:
        condition: service_completed_successfully
    networks:
      - labnet

  mitm:
    build: .
    container_name: week12-mitm
    command: ["mitm.py"]
    environment:
      LISTEN_HOST: "0.0.0.0"
      LISTEN_PORT: "8443"
      CERT_DIR: "/certs"
    volumes:
      - certs:/certs
    depends_on:
      gen_certs:
        condition: service_completed_successfully
    networks:
      - labnet

  alice:
    build: .
    container_name: week12-alice
    command: ["alice.py"]
    environment:
      # Same premise: Alice dials `mitm`, believing it is `bob`. The ONLY
      # difference from the vulnerable file is VERIFY=1 below.
      PEER_HOST: "mitm"
      PEER_PORT: "8443"
      SERVER_HOSTNAME: "bob"
      CERT_DIR: "/certs"
      VERIFY: "1"
      SECRET_MESSAGE: "the vault code is 7731"
    volumes:
      # Alice needs the demo CA (ca.crt) as her trust anchor in fixed mode.
      - certs:/certs
    depends_on:
      gen_certs:
        condition: service_completed_successfully
      mitm:
        condition: service_started
    networks:
      - labnet

volumes:
  certs:

networks:
  labnet:
    driver: bridge
