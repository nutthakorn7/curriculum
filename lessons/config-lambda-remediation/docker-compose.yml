services:
  vulnerable:
    build: .
    command: python vulnerable_app.py
    environment:
      - FLAG_REMEDIATE=${FLAG_REMEDIATE:-FLAG{inverted_allowlist_leaves_ssh_open}}
    ports:
      - "8115:5000"

  fixed:
    build: .
    command: python fixed_app.py
    environment:
      - FLAG_REMEDIATE=${FLAG_REMEDIATE:-FLAG{inverted_allowlist_leaves_ssh_open}}
    ports:
      - "8116:5000"
