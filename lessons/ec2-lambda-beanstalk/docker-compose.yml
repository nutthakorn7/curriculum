services:
  vulnerable:
    build: .
    command: python vulnerable_app.py
    environment:
      - FLAG_EC2=${FLAG_EC2:-FLAG{ssrf_steals_the_instance_role}}
    ports:
      - "8104:5000"

  fixed:
    build: .
    command: python fixed_app.py
    environment:
      - FLAG_EC2=${FLAG_EC2:-FLAG{ssrf_steals_the_instance_role}}
    ports:
      - "8117:5000"
